<!DOCTYPE html>
<html>
<head>
    <title>顧客追加</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #1e293b;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.35);
        }

        h1 {
            text-align: center;
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background-color: #334155;
            color: white;
            margin-bottom: 16px;
        }

        .button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background-color: #475569;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .button:hover {
            background-color: #64748b;
        }

        .back-link {
            display: inline-block;
            margin-top: 16px;
            color: #cbd5e1;
            text-decoration: none;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>顧客追加</h1>

    <form method="POST">
        <label>名前</label>
        <input type="text" name="name" placeholder="例: 山田太郎">

        <button type="submit" class="button">追加する</button>
    </form>

    <a href="/" class="back-link">← 戻る</a>
</div>

</body>
</html>
