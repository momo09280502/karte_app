<!DOCTYPE html>
<html>
<head>
    <title>カルテ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Noto Sans JP', sans-serif;
            padding: 20px;
        }

        h1 { text-align: center; }

        .button {
            display: block;
            background-color: #1e293b;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }

        .customer {
            display: block;
            background-color: #1e293b;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
    </style>
</head>

<body>
<h1>顧客一覧</h1>

<a href="/add" class="button">＋ 顧客追加</a>

{% for customer in customers %}
    <a href="/customer/{{ customer[0] }}" class="customer">
        {{ customer[1] }}
    </a>
{% endfor %}

</body>
</html>
